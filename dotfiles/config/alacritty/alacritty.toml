#tabspaces = 4

[[keyboard.bindings]]
action = "ScrollPageUp"
key = "PageUp"
mode = "~Alt"

[[keyboard.bindings]]
action = "ScrollPageDown"
key = "PageDown"
mode = "~Alt"

[mouse]

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Middle"

[cursor]
style = "Beam"

[font]
size = 8.5

[font.bold]
family = "Iosevka Nerd Font"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "Iosevka Nerd Font"

[font.normal]
family = "Iosevka Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[scrolling]
#auto_scroll = false
#faux_multiplier = 3
history = 100000
multiplier = 3

[selection]
save_to_clipboard = false
semantic_escape_chars = ''',│`|:"' ()[]{}<>'''

[window]
opacity = 0.4

[window.dimensions]
columns = 0
lines = 0

[window.padding]
x = 8
y = 5

[colors]
draw_bold_text_with_bright_colors = true

[keyboard]
